  <div class="reveal-area" id="area">
    <div class="tip">Move mouse here</div>
    <div class="word-container" id="container"></div>
  </div>

  <script>
    const sentence = "Nature always listens.";
    const container = document.getElementById('container');
    
    // Split into words, then into letters to keep spaces intact visually
    const words = sentence.split(' ');
    
    words.forEach(word => {
      let wordDiv = document.createElement('div');
      wordDiv.className = 'word';
      
      word.split('').forEach(letter => {
        let span = document.createElement('span');
        span.innerText = letter;
        
        // Randomize initial scattered state!
        const rot = (Math.random() * 180) - 90;
        const tx = (Math.random() * 400) - 200;
        const ty = (Math.random() * 300) - 150;
        
        span.style.transform = `translate(${tx}px, ${ty}px) rotate(${rot}deg)`;
        span.style.opacity = Math.random() * 0.3;
        span.style.filter = `blur(${Math.random() * 4}px)`;
        
        // Random transition delay so they don't all snap back at exactly the same time
        span.style.transitionDelay = `${Math.random() * 0.3}s`;
        
        wordDiv.appendChild(span);
      });
      container.appendChild(wordDiv);
    });
  </script>
